server:
  port: 8080

spring:
  application:
    name: mini-search

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mini_search}
    username: ${DB_USER:mini_search}
    password: ${DB_PASSWORD:mini_search}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  opensearch:
    url: ${OPENSEARCH_URL:http://localhost:9200}
    index-name: ${OPENSEARCH_INDEX_NAME:pages}